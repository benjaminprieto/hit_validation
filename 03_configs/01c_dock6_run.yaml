# =============================================================================
# 01c DOCK6 Run - Configuration (Hit Validation)
# =============================================================================
# DOCK6 docking with grid_score as primary scoring.
#
# For hit validation: flex method with wide box (5.0A from 01b).
# Hits need conformational search to find optimal binding mode.
#
# NOTE: GB/SA solvation is handled by 01f (separate rescore step).
# DOCK6.13 ignores all _secondary score params during flex docking.
#
# CRITICAL: pruning_clustering_cutoff MUST be 2.0 A.
# The DOCK6 default of 100 A merges all poses into 1 cluster,
# producing only 1 output pose despite requesting 100.
#
# OUTPUT: 05_results/{campaign_id}/01c_dock6_run/
#
# Project: hit_validation
# Module: 01c (DOCK6)
# Version: 1.0 — hit validation defaults (2026-03-27)
# =============================================================================

parameters:
  # "flex" for hit validation (anchor-and-grow conformational search)
  search_method: "flex"

  # --- Sampling ---
  max_orientations: 1000

  # --- Anchor-and-grow (flex-specific, critical) ---
  min_anchor_size: 5
  pruning_max_orients: 1000
  pruning_clustering_cutoff: 2.0       # MUST be 2.0, NOT default 100!
  pruning_conformer_score_cutoff: 100.0

  # --- Output poses ---
  num_scored_conformers: 100
  num_final_scored_poses: 100
  num_preclustered_conformers: 1000

  # --- Minimization ---
  minimize: true
  simplex_max_iterations: 500
  simplex_max_cycles: 1
  simplex_score_converge: 0.1
  simplex_cycle_converge: 1.0
  simplex_trans_step: 1.0
  simplex_rot_step: 0.1
  simplex_tors_step: 10.0
  simplex_random_seed: 0

  # --- Output ---
  write_orientations: false

  # --- Execution ---
  timeout_per_molecule: 600
  log_level: "INFO"

outputs:
  subdir: "01c_dock6_run"

# =============================================================================
# USAGE
# =============================================================================
# python 02_scripts/01c_dock6_run.py --config 03_configs/01c_dock6_run.yaml \
#     --campaigns 04_data/campaigns/NAMIKI_top20_pH63/campaign_config.yaml
# =============================================================================